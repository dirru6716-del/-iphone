<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTCG 卡牌列印助手</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .controls { margin-bottom: 20px; text-align: center; }
        button { background: #007aff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #999; }
        
        /* 模擬卡牌選擇區 */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .card-item { background: white; padding: 8px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card-item img { width: 100%; height: auto; border-radius: 4px; display: block; }
        .card-item p { margin: 5px 0 0; font-size: 12px; color: #666; }

        /* 隱藏的 PDF 渲染容器 (絕對不要用 display: none，否則 html2canvas 抓不到尺寸) */
        #pdf-render-container {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }

        /* 精準 A4 比例與尺寸 (300 DPI 下的 A4 寬度約 2480px，這裡用比例控制即可) */
        .pdf-page {
            width: 210mm;
            height: 297mm;
            background: white;
            position: relative;
            box-sizing: border-box;
            padding: 10mm; /* A4 留白 */
            display: grid;
            grid-template-columns: repeat(3, 63mm);
            grid-template-rows: repeat(3, 88mm);
            gap: 5mm; /* 卡牌間距，方便裁切 */
            justify-content: center;
            align-content: center;
        }

        /* 卡牌與裁切線線條設計 */
        .pdf-card-wrapper {
            position: relative;
            width: 63mm;
            height: 88mm;
            box-sizing: border-box;
        }

        .pdf-card-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px; /* 保留卡牌小圓角 */
        }

        /* 十字裁切線效果 (利用偽元素繪製在外圍) */
        .pdf-card-wrapper::before, .pdf-card-wrapper::after {
            content: "";
            position: absolute;
            border: 0.2mm dashed #999;
            pointer-events: none;
        }
        /* 四角延伸十字線 */
        .pdf-card-wrapper::before {
            top: -3mm; bottom: -3mm; left: 0; right: 0;
            border-width: 0 0.2mm;
        }
        .pdf-card-wrapper::after {
            top: 0; bottom: 0; left: -3mm; right: -3mm;
            border-width: 0.2mm 0;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="download-btn">產生並下載 A4 PDF</button>
        <p style="font-size: 14px; color: #666;">（範例預設載入 10 張卡片，會自動分成 2 頁）</p>
    </div>

    <div class="card-grid" id="selected-cards">
        </div>

    <div id="pdf-render-container"></div>

<script>
    // 模擬使用者選取的寶可夢卡牌 URL 清單 (來自官方來源)
    const sampleCards = [
        { id: '1', url: 'https://asia.pokemon-card.com/tw/card-img/tw00005139.png' }, // 噴火龍ex
        { id: '2', url: 'https://asia.pokemon-card.com/tw/card-img/tw00005139.png' },
        { id: '3', url: 'https://asia.pokemon-card.com/tw/card-img/tw00005139.png' },
        { id: '4', url: 'https://asia.pokemon-card.com/tw/card-img/tw00005139.png' },
        { id: '5', url: 'https://asia.pokemon-card.com/tw/card-img/tw00005139.png' },
        { id: '6', url: 'https://asia.pokemon-card.com/tw/card-img/tw00005139.png' },
        { id: '7', url: 'https://asia.pokemon-card.com/tw/card-img/tw00005139.png' },
        { id: '8', url: 'https://asia.pokemon-card.com/tw/card-img/tw00005139.png' },
        { id: '9', url: 'https://asia.pokemon-card.com/tw/card-img/tw00005139.png' },
        { id: '10', url: 'https://asia.pokemon-card.com/tw/card-img/tw00004944.png' } // 多龍巴魯托ex
    ];

    // 渲染網頁 UI
    const grid = document.getElementById('selected-cards');
    sampleCards.forEach((card, index) => {
        grid.innerHTML += `
            <div class="card-item">
                <img src="${card.url}" alt="card">
                <p>第 ${index + 1} 張</p>
            </div>
        `;
    });

    // 核心功能：解決 Safari 跨域的圖片轉 Base64 處理器
    function getBase64Image(imgUrl) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            // 關鍵：強制設定為不帶憑證的跨域，部分 CDN 支援此方式
            img.setAttribute('crossOrigin', 'anonymous'); 
            img.src = imgUrl;
            img.onload = () => {
                const canvas = document.createElement("canvas");
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
                resolve(canvas.toDataURL("image/png"));
            };
            img.onerror = () => {
                // 如果官方徹底封鎖 CORS，則回退使用免費的反向代理（純前端唯一解）
                const proxyUrl = 'https://images.weserv.nl/?url=' + encodeURIComponent(imgUrl);
                const proxyImg = new Image();
                proxyImg.setAttribute('crossOrigin', 'anonymous');
                proxyImg.src = proxyUrl;
                proxyImg.onload = () => {
                    const canvas = document.createElement("canvas");
                    canvas.width = proxyImg.width;
                    canvas.height = proxyImg.height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(proxyImg, 0, 0);
                    resolve(canvas.toDataURL("image/png"));
                };
                proxyImg.onerror = () => reject(new Error("圖片載入失敗"));
            };
        });
    }

    // 點擊下載按鈕
    document.getElementById('download-btn').addEventListener('click', async () => {
        const btn = document.getElementById('download-btn');
        btn.disabled = true;
        btn.innerText = '處理圖片中...';

        try {
            // 1. 先將所有卡牌轉為 Base64（避免 html2canvas 跨域爆白畫面）
            const base64Cards = [];
            for (let card of sampleCards) {
                const b64 = await getBase64Image(card.url);
                base64Cards.push(b64);
            }

            btn.innerText = '正在排版 PDF...';
            const renderContainer = document.getElementById('pdf-render-container');
            renderContainer.innerHTML = ''; // 清空舊資料

            // 2. 每 9 張卡片切成一頁 A4
            const cardsPerPage = 9;
            for (let i = 0; i < base64Cards.length; i += cardsPerPage) {
                const pageData = base64Cards.slice(i, i + cardsPerPage);
                
                const pageEl = document.createElement('div');
                pageEl.className = 'pdf-page';
                
                pageData.forEach(b64 => {
                    pageEl.innerHTML += `
                        <div class="pdf-card-wrapper">
                            <img src="${b64}" />
                        </div>
                    `;
                });
                renderContainer.appendChild(pageEl);
            }

            btn.innerText = '產生 PDF 中...';
            
            // 3. 初始化 jsPDF (A4 尺寸，單位公釐 mm)
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'p',
                unit: 'mm',
                format: 'a4'
            });

            const pages = renderContainer.querySelectorAll('.pdf-page');
            
            for (let index = 0; index < pages.length; index++) {
                if (index > 0) pdf.addPage(); // 超過一頁就加新頁面

                // 使用 html2canvas 將 DOM 轉為 Canvas，精確度調高至比率 2 (適合列印品質)
                const canvas = await html2canvas(pages[index], {
                    scale: 2, 
                    useCORS: true,
                    allowTaint: false,
                    logging: false
                });

                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                // 將畫布完美填滿 A4 (210mm × 297mm)
                pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
            }

            // 4. 觸發下載 (在 iOS Safari 會開啟新分頁或彈出下載確認)
            pdf.save('PTCG_Deck_List.pdf');

        } catch (error) {
            console.error(error);
            alert('產生失敗，請稍後再試：' + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = '產生並下載 A4 PDF';
        }
    });
</script>
</body>
</html>
